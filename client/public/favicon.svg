<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body -->
  <rect x="16" y="28" width="32" height="24" rx="4" fill="url(#grad)"/>
  <!-- Head -->
  <circle cx="32" cy="20" r="12" fill="url(#grad)"/>
  <!-- Antennas -->
  <line x1="24" y1="10" x2="20" y2="2" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="10" x2="44" y2="2" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="28" cy="18" r="2" fill="white"/>
  <circle cx="36" cy="18" r="2" fill="white"/>
  <!-- Arms -->
  <rect x="8" y="32" width="8" height="16" rx="4" fill="url(#grad)"/>
  <rect x="48" y="32" width="8" height="16" rx="4" fill="url(#grad)"/>
  <!-- Legs -->
  <rect x="20" y="52" width="8" height="10" rx="4" fill="url(#grad)"/>
  <rect x="36" y="52" width="8" height="10" rx="4" fill="url(#grad)"/>
</svg>
